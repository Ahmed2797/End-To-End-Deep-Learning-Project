<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroScan AI | Diagnostic Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .loader { border-top-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .drop-zone-active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="min-h-screen pb-12">

    <nav class="border-b border-slate-800 p-4 mb-8 sticky top-0 bg-slate-900/80 backdrop-blur-md z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i data-lucide="brain-circuit" class="text-blue-500 w-8 h-8"></i>
                <span class="text-xl font-bold tracking-tight">NeuroScan <span class="text-blue-500">AI</span></span>
            </div>
            <span class="text-xs bg-slate-800 px-3 py-1 rounded-full flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> System Online
            </span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-4 space-y-6">
            <section class="glass-card rounded-2xl p-6">
                <h2 class="flex items-center gap-2 text-lg font-semibold mb-4 text-blue-400">
                    <i data-lucide="file-text" class="w-5 h-5"></i> Knowledge Base
                </h2>
                <div class="border-2 border-dashed border-slate-700 rounded-xl p-8 text-center hover:border-blue-500 transition-all cursor-pointer group" id="drop-zone-pdf">
                    <input type="file" id="pdf-input" class="hidden" accept=".pdf">
                    <i data-lucide="upload-cloud" class="w-10 h-10 mx-auto mb-2 text-slate-500 group-hover:text-blue-400"></i>
                    <p class="text-sm text-slate-400" id="pdf-status">Click to upload Patient PDF</p>
                </div>
                <button onclick="handlePdfUpload()" class="w-full mt-4 bg-blue-600 hover:bg-blue-700 py-2 rounded-lg font-medium transition-all">Process Document</button>
            </section>

            <section class="glass-card rounded-2xl p-6">
                <h2 class="flex items-center gap-2 text-lg font-semibold mb-4 text-purple-400">
                    <i data-lucide="scan-eye" class="w-5 h-5"></i> Vision Pipeline
                </h2>
                <div class="border-2 border-dashed border-slate-700 rounded-xl p-4 text-center cursor-pointer hover:border-purple-500 transition-all group" id="drop-zone-img">
                    <input type="file" id="image-input" class="hidden" accept="image/*">
                    <i data-lucide="image-plus" class="w-8 h-8 mx-auto mb-2 text-slate-500 group-hover:text-purple-400"></i>
                    <p class="text-xs text-slate-400" id="img-status">Select MRI/CT Scan</p>
                </div>
                
                <div class="grid grid-cols-2 gap-2 mt-4">
                    <button onclick="runVision('vgg')" class="bg-slate-800 hover:bg-slate-700 p-3 rounded-xl text-xs border border-slate-700">VGG16 Classify</button>
                    <button onclick="runVision('yolo')" class="bg-slate-800 hover:bg-slate-700 p-3 rounded-xl text-xs border border-slate-700">YOLO Detect</button>
                    <button onclick="runVision('sam')" class="col-span-2 bg-purple-600 hover:bg-purple-700 p-3 rounded-xl text-sm font-semibold">SAM Segmentation</button>
                </div>
            </section>
        </div>

        <div class="lg:col-span-8 space-y-6">
            <div id="vision-preview" class="glass-card rounded-2xl overflow-hidden h-[450px] flex items-center justify-center relative bg-slate-950 border border-slate-800">
                <div id="vision-placeholder" class="text-center text-slate-600">
                    <i data-lucide="aperture" class="w-12 h-12 mx-auto mb-2 opacity-20 animate-spin-slow"></i>
                    <p>Awaiting Scan Data...</p>
                </div>
                <img id="result-image" class="hidden h-full w-full object-contain">
                <div id="vision-loader" class="hidden absolute inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center z-10">
                    <div class="flex flex-col items-center gap-3">
                        <div class="loader w-10 h-10 border-4 border-blue-500 rounded-full"></div>
                        <p class="text-blue-400 text-sm font-medium">Analyzing Neural Patterns...</p>
                    </div>
                </div>
            </div>

            <div class="glass-card rounded-2xl flex flex-col h-[400px]">
                <div id="chat-history" class="flex-1 overflow-y-auto p-4 space-y-4">
                    <div class="bg-slate-800/50 p-3 rounded-xl text-sm border border-slate-700 inline-block max-w-[85%]">
                        System ready. Upload a medical report or image to begin analysis.
                    </div>
                </div>

                <div class="p-4 border-t border-slate-800">
                    <div class="flex gap-2 bg-slate-900 p-2 rounded-xl border border-slate-700 focus-within:border-blue-500">
                        <button id="mic-btn" class="p-2 text-slate-400 hover:text-red-500 transition-colors">
                            <i data-lucide="mic" class="w-5 h-5"></i>
                        </button>
                        <input type="text" id="query-input" placeholder="Ask a diagnostic question..." class="bg-transparent border-none focus:ring-0 flex-1 text-sm">
                        <button onclick="handleAsk()" class="bg-blue-600 p-2 rounded-lg hover:bg-blue-500">
                            <i data-lucide="send-horizontal" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
